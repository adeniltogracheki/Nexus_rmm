name: Android APK Build

on:
  push:
    branches: [main]
    paths:
      - 'apps/android/**'
  workflow_dispatch:         # permite rodar manualmente pelo painel do GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Java 17 é o mínimo exigido pelo AGP 8.x
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Gradle com cache — segundo build é muito mais rápido
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper

      # Android SDK já vem instalado no ubuntu-latest.
      # Só precisamos aceitar as licenças.
      - name: Accept Android SDK licenses
        run: yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true

      # Escreve o local.properties com o caminho correto do SDK no runner
      # (o arquivo está no .gitignore pois o caminho varia por ambiente)
      - name: Write local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > apps/android/local.properties

      # Limpa o cache de transforms do Gradle para evitar binários AAPT2
      # de outra arquitetura vindos de cache anterior.
      - name: Clear Gradle transforms cache
        run: rm -rf ~/.gradle/caches/transforms-*

      # Força o AGP a usar o AAPT2 do SDK pré-instalado no runner
      # (binário nativo da arquitetura do runner) em vez do AAPT2
      # bundled no Maven (que pode ser de outra arquitetura).
      - name: Override AAPT2 to use SDK binary
        run: |
          AAPT2="$ANDROID_SDK_ROOT/build-tools/34.0.0/aapt2"
          echo "android.aapt2FromMavenOverride=$AAPT2" >> apps/android/gradle.properties
          echo "✓ AAPT2 override: $AAPT2"
          ls -la "$AAPT2"

      # Diagnóstico: mostrar versão do AAPT2 override antes do build
      - name: Verify AAPT2 binary
        run: |
          AAPT2="$ANDROID_SDK_ROOT/build-tools/34.0.0/aapt2"
          echo "=== AAPT2 path: $AAPT2 ==="
          ls -la "$AAPT2"
          file "$AAPT2" || echo "(file command not available)"
          uname -m
          "$AAPT2" version && echo "✓ AAPT2 runs ok" || echo "✗ AAPT2 failed to run"

      # Imprime gradle.properties final (com override AAPT2) antes do build
      - name: Print gradle.properties
        run: cat apps/android/gradle.properties

      # ── Fase 1: recursos (AAPT2) ─────────────────────────────────────────
      - name: Step 1 - Process Resources
        id: step_resources
        working-directory: apps/android
        run: |
          set -o pipefail
          ./gradlew :app:processDebugResources --no-daemon --stacktrace 2>&1 | tee /tmp/step-resources.log
        continue-on-error: true

      - name: Show Resource Error
        if: steps.step_resources.outcome == 'failure'
        run: |
          echo "=== PROCESS RESOURCES FAILED ==="
          grep -E "error:|AAPT2|Cannot|FAILED" /tmp/step-resources.log | head -40 || true
          tail -50 /tmp/step-resources.log || true

      # ── Fase 2: compilação Kotlin ─────────────────────────────────────────
      - name: Step 2 - Compile Kotlin
        id: step_kotlin
        working-directory: apps/android
        run: |
          set -o pipefail
          ./gradlew :app:compileDebugKotlin --no-daemon --stacktrace 2>&1 | tee /tmp/step-kotlin.log
        continue-on-error: true

      - name: Show Kotlin Error
        if: steps.step_kotlin.outcome == 'failure'
        run: |
          echo "=== KOTLIN COMPILATION FAILED ==="
          grep -E "error:|Unresolved|Cannot find|Type mismatch" /tmp/step-kotlin.log | head -60 || true
          tail -80 /tmp/step-kotlin.log || true

      # ── Fase 3: build completo (só se ambos passaram) ──────────────────────
      - name: Build debug APK
        if: steps.step_resources.outcome == 'success' && steps.step_kotlin.outcome == 'success'
        working-directory: apps/android
        run: |
          set -o pipefail
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee /tmp/gradle-build.log

      # Falha o job se qualquer step de build falhou
      - name: Fail if any build step failed
        if: steps.step_resources.outcome == 'failure' || steps.step_kotlin.outcome == 'failure'
        run: exit 1

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ github.sha }}
          path: |
            /tmp/step-resources.log
            /tmp/step-kotlin.log
            /tmp/gradle-build.log
          retention-days: 7

      # ── Release APK (assinado com keystore do Secret) ────────────────────
      # Ative este bloco quando quiser distribuir para produção.
      # Pré-requisitos (Settings → Secrets → Actions):
      #   KEYSTORE_BASE64   — keystore.jks em base64  (base64 -w0 keystore.jks)
      #   KEY_ALIAS         — alias da chave (ex: nexus-key)
      #   KEY_PASSWORD      — senha da chave
      #   STORE_PASSWORD    — senha do keystore
      #
      # - name: Build release APK
      #   working-directory: apps/android
      #   env:
      #     KEYSTORE_BASE64:  ${{ secrets.KEYSTORE_BASE64 }}
      #     KEY_ALIAS:        ${{ secrets.KEY_ALIAS }}
      #     KEY_PASSWORD:     ${{ secrets.KEY_PASSWORD }}
      #     STORE_PASSWORD:   ${{ secrets.STORE_PASSWORD }}
      #   run: |
      #     echo "$KEYSTORE_BASE64" | base64 --decode > keystore.jks
      #     ./gradlew assembleRelease --no-daemon \
      #       -Pandroid.injected.signing.store.file=$PWD/keystore.jks \
      #       -Pandroid.injected.signing.store.password=$STORE_PASSWORD \
      #       -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
      #       -Pandroid.injected.signing.key.password=$KEY_PASSWORD

      # Upload o APK como artefato — baixe direto pela aba Actions do GitHub
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: nexus-rmm-android-debug-${{ github.sha }}
          path: apps/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # Mostra o tamanho do APK gerado no log para diagnóstico rápido
      - name: APK info
        run: |
          APK=apps/android/app/build/outputs/apk/debug/app-debug.apk
          echo "Tamanho: $(du -sh $APK | cut -f1)"
          echo "SHA256:  $(sha256sum $APK | cut -d' ' -f1)"

      # ── Deploy automático ao servidor ────────────────────────────────────────
      # Envia o APK para /mnt/nexus-rmm/apps/android/releases/ no servidor.
      # Pré-requisito: segredo DEPLOY_SSH_KEY configurado em Settings → Secrets → Actions.
      - name: Deploy APK to server
        if: steps.step_resources.outcome == 'success' && steps.step_kotlin.outcome == 'success'
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          APK=apps/android/app/build/outputs/apk/debug/app-debug.apk
          SERVER=163.176.169.89
          REMOTE_DIR=/mnt/nexus-rmm/apps/android/releases
          SHA=${{ github.sha }}

          # Configura SSH
          mkdir -p ~/.ssh
          echo "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$SERVER" >> ~/.ssh/known_hosts 2>/dev/null

          # Cria diretório remoto se não existir
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no root@"$SERVER" \
            "mkdir -p $REMOTE_DIR"

          # Envia APK com nome versionado + atualiza link latest
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            "$APK" root@"$SERVER":"$REMOTE_DIR/app-debug-${SHA:0:8}.apk"

          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no root@"$SERVER" \
            "ln -sf $REMOTE_DIR/app-debug-${SHA:0:8}.apk $REMOTE_DIR/latest.apk && \
             echo '✓ Deploy concluído:' && ls -lh $REMOTE_DIR/latest.apk"

          echo "✓ APK disponível em: $SERVER:$REMOTE_DIR/app-debug-${SHA:0:8}.apk"
